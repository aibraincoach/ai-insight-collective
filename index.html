  /* Transform-only entrance — opacity is NEVER animated, so a frozen animation clock can't hide content */
  @keyframes riseIn { from { transform: translateY(16px); } to { transform: translateY(0); } }
  .rise { opacity: 1; }
  html.anim .rise { animation: riseIn 0.75s cubic-bezier(0.25,0.46,0.45,0.94) both; }
  html.anim .d1 { animation-delay: 0.05s; } html.anim .d2 { animation-delay: 0.15s; }

  /* Gauge tick */
  @keyframes fade-up-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .in-view .card-anim { animation: fade-up-in 0.7s cubic-bezier(0.25,0.46,0.45,0.94) both; }
  .in-view .card-anim:nth-child(1) { animation-delay: 0.1s; }
  .in-view .card-anim:nth-child(2) { animation-delay: 0.22s; }
  .in-view .card-anim:nth-child(3) { animation-delay: 0.34s; }

  @media (prefers-reduced-motion: reduce) { .rise, .card-anim { animation: none; } }
</style>
<script>
  /* Enable entrance animations only after PROOF the animation clock advances (two rAF ticks with increasing timestamps) */
  (function () {
    var first = null;
    function tick(ts) {
      if (first === null) { first = ts; requestAnimationFrame(tick); }
      else if (ts > first) { document.documentElement.classList.add("anim"); }
      /* same timestamp or never fires → frozen timeline → leave content static & visible */
    }
    requestAnimationFrame(tick);
  })();
</script>

/* ══════════════════════════════════════════════════════════
   FitSite — scales a 1024×640 canvas to fill its container.
   Uses rAF polling until size is stable AND ≠ 1024×640
   (avoids Tailwind CDN async injection trap).
   ══════════════════════════════════════════════════════════ */
function FitSite({ children }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(0);
  React.useLayoutEffect(() => {
    const el = ref.current;
    if (!el) return;
    let cancelled = false, raf = null, last = -1, stable = 0;
    const tids = [];
    const measure = () => {
      const w = el.clientWidth;
      if (w) setScale(w / 1024);
      return w;
    };
    const poll = () => {
      if (cancelled) return;
      const w = el.clientWidth;
      if (w && w === last) { stable++; measure(); if (stable > 5) return; }
      else { stable = 0; last = w; measure(); }
      raf = requestAnimationFrame(poll);
    };
    poll();
    [80, 250, 700].forEach((ms) => tids.push(setTimeout(() => { if (!cancelled) measure(); }, ms)));
    const onResize = () => measure();
    window.addEventListener("resize", onResize);
    return () => { cancelled = true; if (raf) cancelAnimationFrame(raf); tids.forEach(clearTimeout); window.removeEventListener("resize", onResize); };
  }, []);
  return (
    <div ref={ref} style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
      <div style={{ position: "absolute", left: 0, top: 0, width: 1024, height: 640, transform: "scale(" + scale + ")", transformOrigin: "top left", visibility: scale ? "visible" : "hidden" }}>
        {children}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   Before/After Compare Slider
   ══════════════════════════════════════════════════════════ */
function CompareSlider() {
  const [pos, setPos] = useState(0); // start fully on the OLD site
  const [dragging, setDragging] = useState(false);
  const [labelsOn, setLabelsOn] = useState(true);
  const frameRef = useRef(null);
  const hideTimer = useRef(null);
  const userTookOver = useRef(false);

  /* Entrance sweep: rest on the old site, then slide to reveal the new design */
  useEffect(() => {
    let raf = null, start;
    const t0 = setTimeout(() => {
      const dur = 1900, to = 100;
      const ease = (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
      const step = (ts) => {
        if (userTookOver.current) return;
        if (start === undefined) start = ts;
        const p = Math.min(1, (ts - start) / dur);
        setPos(to * ease(p));
        if (p < 1) raf = requestAnimationFrame(step);
      };
      raf = requestAnimationFrame(step);
    }, 800);
    return () => { clearTimeout(t0); if (raf) cancelAnimationFrame(raf); };
  }, []);

  const posFromX = useCallback((clientX) => {
    const rect = frameRef.current.getBoundingClientRect();
    setPos(Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100)));
  }, []);

  const wake = useCallback(() => {
    setLabelsOn(true);
    clearTimeout(hideTimer.current);
    hideTimer.current = setTimeout(() => setLabelsOn(false), 1400);
  }, []);

  useEffect(() => {
    hideTimer.current = setTimeout(() => setLabelsOn(false), 2600);
    const el = frameRef.current;
    if (el) el.addEventListener("pointermove", wake);
    return () => { clearTimeout(hideTimer.current); if (el) el.removeEventListener("pointermove", wake); };
  }, [wake]);

  useEffect(() => {
    if (!dragging) return;
    const onMove = (e) => posFromX(e.touches ? e.touches[0].clientX : e.clientX);
    const onUp = () => setDragging(false);
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    return () => { window.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp); };
  }, [dragging, posFromX]);

  return (
    /* Outer frame — black bezel · 60% of the page on desktop */
    <div className="rise d4" style={{ width: "min(60vw, 740px)", minWidth: "min(92vw, 740px)", margin: "0 auto", padding: "10px", background: "#0a0a0a", borderRadius: 24, boxShadow: "0 30px 80px -15px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.06)" }}>
      <div
        ref={frameRef}
        style={{ position: "relative", width: "100%", aspectRatio: "1024/640", borderRadius: 14, overflow: "hidden", cursor: dragging ? "grabbing" : "ew-resize", touchAction: "none", background: "#111" }}
        onPointerDown={(e) => { userTookOver.current = true; setDragging(true); posFromX(e.clientX); wake(); }}
      >
        {/* Old site — base */}
        <FitSite><OldSite></OldSite></FitSite>
        {/* NEW site — real brightblocks.ca screenshot, clipped */}
      <div style={{ position: "absolute", inset: 0, clipPath: "inset(0 " + (100 - pos) + "% 0 0)" }}>
          <img src="assets/brightblocks-new.jpg" alt="The new brightblocks.ca" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
        </div>
        {/* Labels */}
        <span style={{ position: "absolute", top: 16, left: 16, fontSize: 10, fontWeight: 700, letterSpacing: "0.18em", textTransform: "uppercase", background: "rgba(0,0,0,0.6)", color: "#fff", borderRadius: 100, padding: "6px 12px", backdropFilter: "blur(8px)", pointerEvents: "none", opacity: labelsOn && pos > 16 ? 1 : 0, transition: "opacity 0.6s ease-out" }}>✦ Spiffy</span>
        <span style={{ position: "absolute", top: 16, right: 16, fontSize: 10, fontWeight: 700, letterSpacing: "0.18em", textTransform: "uppercase", background: "rgba(255,255,255,0.7)", color: "rgba(0,0,0,0.6)", borderRadius: 100, padding: "6px 12px", backdropFilter: "blur(8px)", pointerEvents: "none", opacity: labelsOn && pos < 84 ? 1 : 0, transition: "opacity 0.6s ease-out" }}>Before</span>
        {/* Divider + handle */}
        <div style={{ position: "absolute", top: 0, bottom: 0, left: pos + "%", pointerEvents: "none" }}>
          <div style={{ position: "absolute", top: 0, bottom: 0, left: "50%", transform: "translateX(-50%)", width: 1, background: "rgba(255,255,255,0.9)", boxShadow: "0 0 8px rgba(0,0,0,0.4)" }}></div>
          <button
            style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 36, height: 36, borderRadius: "50%", background: "#fff", border: "none", display: "flex", alignItems: "center", justifyContent: "center", gap: 3, boxShadow: "0 2px 12px rgba(0,0,0,0.4)", cursor: dragging ? "grabbing" : "grab", pointerEvents: "auto" }}
            onPointerDown={(e) => { e.stopPropagation(); userTookOver.current = true; setDragging(true); wake(); }}
            onKeyDown={(e) => { if (e.key === "ArrowLeft") { setPos((p) => Math.max(0, p - 4)); wake(); } if (e.key === "ArrowRight") { setPos((p) => Math.min(100, p + 4)); wake(); } }}
            aria-label="Drag to compare" role="slider" aria-valuenow={Math.round(pos)} aria-valuemin="0" aria-valuemax="100"
          >
            <svg width="5" height="8" viewBox="0 0 6 9" aria-hidden="true"><path d="M6 0 L0 4.5 L6 9 Z" fill="#1d1d1f"></path></svg>
            <svg width="5" height="8" viewBox="0 0 6 9" aria-hidden="true"><path d="M0 0 L6 4.5 L0 9 Z" fill="#1d1d1f"></path></svg>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   BigPanel — scales a fixed-design-width panel up to its
   container so type and spacing grow proportionally
   ══════════════════════════════════════════════════════════ */
function BigPanel({ children, design = 880 }) {
  const outerRef = useRef(null);
  const innerRef = useRef(null);
  const [s, setS] = useState(1);
  const [h, setH] = useState(null);
  React.useLayoutEffect(() => {
    let cancelled = false, raf = null, n = 0;
    const measure = () => {
      const o = outerRef.current, inn = innerRef.current;
      if (!o || !inn) return;
      const w = o.clientWidth;
      if (w) {
        const scale = w / design;
        setS(scale);
        setH(inn.offsetHeight * scale);
      }
    };
    const poll = () => { if (cancelled || n++ > 90) return; measure(); raf = requestAnimationFrame(poll); };
    poll();
    const onResize = () => measure();
    window.addEventListener("resize", onResize);
    return () => { cancelled = true; if (raf) cancelAnimationFrame(raf); window.removeEventListener("resize", onResize); };
  }, []);
  return (
    <div ref={outerRef} style={{ width: "100%", height: h || "auto", overflow: "visible" }}>
      <div ref={innerRef} style={{ width: design, transform: "scale(" + s + ")", transformOrigin: "top left" }}>
        {children}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════

    obs.observe(el);
    return () => obs.disconnect();
  }, []);

          <p className="rise d3" style={{ marginTop: 16, marginBottom: 36, fontSize: 16, lineHeight: 1.65, color: "#6e6e73", maxWidth: 480, marginLeft: "auto", marginRight: "auto" }}>
            We take the site you have, rebuild it with AI, and hand back one you're proud of. Drag the slider — that's a real client.
          </p>
          <div className="rise d3" style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 44 }}>
            <a href="#pricing" style={{ display: "inline-block", textDecoration: "none", borderRadius: 100, background: "#1d1d1f", color: "#fff", fontSize: 13.5, fontWeight: 600, padding: "12px 24px", cursor: "pointer" }}>Get your rebuild</a>
            <a href="#pricing" style={{ display: "inline-block", textDecoration: "none", borderRadius: 100, background: "transparent", color: "#1d1d1f", fontSize: 13.5, fontWeight: 500, padding: "11px 20px", border: "1px solid rgba(0,0,0,0.15)", cursor: "pointer" }}>See pricing</a>
          </div>
          {/* Tablet */}
          <CompareSlider></CompareSlider>
        </div>
      </section>

      {/* ── SECTIONS 2 + 3: Forest world — sticky video stands still once in view ── */}
      <div style={{ position: "relative" }}>
        {/* Sticky forest — fills viewport and holds while content scrolls over it */}
        <div style={{ position: "sticky", top: 0, height: "100vh", overflow: "hidden", zIndex: 0 }}>
          <video autoPlay loop playsInline style={{ width: "100%", height: "100%", objectFit: "cover" }} src="assets/nexora-hero.mp4"
            ref={(el) => { if (el) { el.muted = true; el.play().catch(() => {}); } }}
          ></video>
        </div>

        {/* Content scrolls over the standing forest */}
        <div style={{ position: "relative", zIndex: 10, marginTop: "-100vh" }}>

          {/* ── NEXORA: Dashboard / Control Panel ── */}
          <section style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "80px 24px" }}>
            <div style={{ maxWidth: 860, width: "100%", textAlign: "center", marginBottom: 40 }}>
              <span style={{ display: "inline-flex", alignItems: "center", borderRadius: 100, background: "#fff", padding: "6px 16px", fontSize: 11.5, fontWeight: 500, color: "#1d1d1f", marginBottom: 20, boxShadow: "0 4px 16px rgba(0,0,0,0.25)" }}>It comes with this</span>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(2rem,5vw,3.6rem)", lineHeight: 1.05, letterSpacing: "-0.025em", color: "#fff", margin: 0, textShadow: "0 2px 28px rgba(0,0,0,0.55)" }}>
                Your whole business. <em style={{ fontStyle: "italic" }}>One screen.</em>
              </h2>
              <p style={{ marginTop: 14, fontSize: 15, lineHeight: 1.65, color: "#fff", maxWidth: 440, margin: "14px auto 0", textShadow: "0 1px 18px rgba(0,0,0,0.6)" }}>
                Sales, website traffic, ad spend, and where your customers actually come from — pulled together while you sleep. This lives behind your new website.
              </p>
            </div>

                Three options. <em style={{ fontStyle: "italic" }}>One click.</em>

          </section>
        </div>
      </div>

      <PainSelector></PainSelector>
      <MondayBriefing></MondayBriefing>
      <PricingSection></PricingSection>
      <CTASection></CTASection>
      <AICFooter></AICFooter>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App></App>);
</script>
</body>
</html>
